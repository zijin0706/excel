version: 1

settings:
  input_dir: "./data/input"
  output_dir: "./data/output"
  chunk_size: 300000
  encoding: "utf-8"
  duckdb:
    memory_limit: "8GB"
    threads: 4

sources:
  - name: pending
    files: "pending*.csv"
    format: csv
    delimiter: ","
    has_header: true

pipeline:
  # 步骤1：按主数据编码分组聚合
  - step: aggregated
    sql: |
      SELECT
        split_part("IdPedido", '-', 1)                                  AS main_code,
        string_agg("IdPedido", ', ')                                     AS sub_codes,
        count(*)                                                         AS actual_count,
        max(try_cast("Quantidade de volumes" AS INTEGER))                AS expected_count,
        first("Número de pedido cliente de pedido mestre")               AS "Número de pedido cliente de pedido mestre",
        first("UF DESTINO")                                              AS "UF DESTINO",
        first("CIDADE DESTINO")                                          AS "CIDADE DESTINO",
        first("CEP DESTINO")                                             AS "CEP DESTINO",
        first("VlrAdvalorem %")                                          AS "VlrAdvalorem %",
        first("VlrGris %")                                               AS "VlrGris %",
        first("ICMS税率 %")                                                AS "ICMS税率 %",
        sum(try_cast("Valor da Nota Fiscal de Mercadoria" AS DOUBLE))    AS "Valor da Nota Fiscal de Mercadoria all",
        sum(try_cast("Peso Calculado/Cobrado" AS DOUBLE))                AS "Peso Calculado/Cobrado all",
        sum(try_cast("VlrFretePeso" AS DOUBLE))                          AS "VlrFretePeso all",
        sum(try_cast("VlrAdvalorem" AS DOUBLE))                          AS "VlrAdvalorem all",
        sum(try_cast("VlrGris" AS DOUBLE))                               AS "VlrGris all",
        sum(try_cast("Valor ICMS" AS DOUBLE))                            AS "Valor ICMS all",
        sum(try_cast("ValorTotalcomISS" AS DOUBLE))                      AS "ValorTotalcomISS all",
        sum(try_cast("Pagamentos Totais" AS DOUBLE))                     AS "Pagamentos Totais all",
        sum(try_cast("Peso Volumétrico" AS DOUBLE))                      AS "Peso Volumétrico all",
        sum(try_cast("Peso Real" AS DOUBLE))                             AS "Peso Real all",
        sum(try_cast("Peso Pedido" AS DOUBLE))                           AS "Peso Pedido all"
      FROM pending
      GROUP BY split_part("IdPedido", '-', 1)

  # 步骤2：匹配成功（汇总数据）
  - step: matched
    from: aggregated
    filter: "actual_count = expected_count"

  # 步骤3：匹配失败的主编码
  - step: unmatched_codes
    from: aggregated
    filter: "actual_count != expected_count"

  # 步骤4：匹配失败的原始明细数据
  - step: unmatched_raw
    sql: |
      SELECT p.*
      FROM pending p
      WHERE split_part(p."IdPedido", '-', 1) IN (
        SELECT main_code FROM unmatched_codes
      )

outputs:
  - name: 匹配成功
    from: matched
    path: "matched/"
    prefix: "匹配成功"
    format: xlsx

  - name: 匹配失败
    from: unmatched_raw
    path: "unmatched/"
    prefix: "匹配失败_源数据"
    format: xlsx
